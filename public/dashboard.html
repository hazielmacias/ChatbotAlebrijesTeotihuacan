              Configuracion

        </div>
      </div>
    </header>

      <main class="app-main">

  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/notifications.css">
  <link rel="stylesheet" href="/css/archived.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/conversations.js"></script>
  <script src="/js/views/notifications.js"></script>
  <script src="/js/views/archived.js"></script>
  <script src="/js/views/settings.js"></script>
  <script>
    (async function() {
      // Verificar autenticacion
      const ok = await window.auth.requireAuth();
      if (!ok) return;

      // Pintar info del usuario
      const user = window.auth.getUser();
      const name = window.auth.getUserDisplayName();
      const email = window.auth.getUserEmail();
      const initials = window.auth.getUserInitials();

      document.getElementById('user-avatar').textContent = initials;
      document.getElementById('user-name').textContent = name;
      const emailEl = document.getElementById('user-email');
      if (emailEl) emailEl.textContent = email;

      // User menu toggle
      const userMenu = document.getElementById('user-menu');
      const userTrigger = document.getElementById('user-menu-trigger');
      userTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = userMenu.classList.toggle('user-menu--open');
        userTrigger.setAttribute('aria-expanded', isOpen);
      });
      document.addEventListener('click', (e) => {
        if (!userMenu.contains(e.target)) {
          userMenu.classList.remove('user-menu--open');
          userTrigger.setAttribute('aria-expanded', 'false');
        }
      });

      // Logout button in user menu (legacy)
      const legacyLogout = document.getElementById('logout-btn');
      if (legacyLogout) {
        legacyLogout.addEventListener('click', () => {
          if (confirm('Cerrar sesion?')) {
            window.auth.logout();
          }
        });
      }

      // Logout button in sidebar
      const sidebarLogout = document.getElementById('btn-logout');
      if (sidebarLogout) {
        sidebarLogout.addEventListener('click', () => {
          if (confirm('Cerrar sesion?')) {
            window.auth.logout();
          }
        });
      }

      // Settings menu link (close menu after click)
      document.querySelectorAll('.user-menu__item[data-route]').forEach(item => {
        item.addEventListener('click', () => {
          userMenu.classList.remove('user-menu--open');
        });
      });

      // Register routes
      window.router.register('dashboard', window.dashboardView.render);
      window.router.register('conversations', window.conversationsView.render);
      window.router.register('notifications', window.notificationsView.render);
      window.router.register('archived', window.archivedView.render);
      window.router.register('settings', window.settingsView.render);

      // Init en Dashboard
      window.router.init('dashboard');
    })();
  </script>
</body>
</html>

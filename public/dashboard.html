<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/whatsapp-theme.css">
  <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
  <div id="app">
    <div class="tiliche-bar"></div>

    <header class="app-header">
      <div class="app-header__brand">
        <img class="app-header__logo" src="/logo-alebrijes.png" alt="Alebrijes Teotihuacan">
        <div class="app-header__title">
          <span class="app-header__title-main">Alebrijes Teotihuacan</span>
          <span class="app-header__title-sub">Panel de administracion</span>
        </div>
      </div>

      <div class="app-header__user">
        <div class="user-menu" id="user-menu">
          <button class="user-menu__trigger" id="user-menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <span class="user-menu__avatar" id="user-avatar">U</span>
            <span class="user-menu__name" id="user-name">Usuario</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M7 10l5 5 5-5z"/>
            </svg>
          </button>
          <div class="user-menu__dropdown" role="menu">
            <div class="user-menu__email" id="user-email"></div>
            <div class="user-menu__divider"></div>
            <a href="#settings" class="user-menu__item" role="menuitem" data-route="settings">

              </svg>
              Configuracion
            </a>
            <button class="user-menu__item user-menu__item--danger" id="logout-btn" role="menuitem" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
              </svg>
              Cerrar sesion
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="app-body">
      <aside class="app-sidebar">
        <nav class="app-nav">
          <a href="#conversations" class="app-nav__link" data-route="conversations">
            <svg class="app-nav__icon" viewBox="0 0 24 24">
              <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
            </svg>
            <span>Conversaciones</span>
          </a>
          <a href="#kpis" class="app-nav__link" data-route="kpis">
            <svg class="app-nav__icon" viewBox="0 0 24 24">
              <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
            </svg>
            <span>KPIs</span>
          </a>
          <a href="#catalog" class="app-nav__link" data-route="catalog">
            <svg class="app-nav__icon" viewBox="0 0 24 24">
              <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V6h5.17l2 2H20v10z"/>
            </svg>
            <span>Catalogo</span>
          </a>
          <a href="#settings" class="app-nav__link" data-route="settings">
            <svg class="app-nav__icon" viewBox="0 0 24 24">
              <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
            <span>Configuracion</span>
          </a>
        </nav>
        <div class="app-nav__footer">
          Alebrijes Teotihuacan &copy; 2026
        </div>
      </aside>

      <main class="app-main">
        <div class="app-view app-view--flush" id="view-container">
          <div class="loading-overlay"><div class="spinner spinner--lg"></div></div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/views/conversations.js"></script>
  <script src="/js/views/kpis.js"></script>
  <script src="/js/views/catalog.js"></script>
  <script src="/js/views/settings.js"></script>
  <script>
    (async function() {
      // Verificar autenticacion
      const ok = await window.auth.requireAuth();
      if (!ok) return;

      // Pintar info del usuario
      const user = window.auth.getUser();
      const name = window.auth.getUserDisplayName();
      const email = window.auth.getUserEmail();
      const initials = window.auth.getUserInitials();

      document.getElementById('user-avatar').textContent = initials;
      document.getElementById('user-name').textContent = name;
      const emailEl = document.getElementById('user-email');
      if (emailEl) emailEl.textContent = email;

      // User menu toggle
      const userMenu = document.getElementById('user-menu');
      const userTrigger = document.getElementById('user-menu-trigger');
      userTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = userMenu.classList.toggle('user-menu--open');
        userTrigger.setAttribute('aria-expanded', isOpen);
      });
      document.addEventListener('click', (e) => {
        if (!userMenu.contains(e.target)) {
          userMenu.classList.remove('user-menu--open');
          userTrigger.setAttribute('aria-expanded', 'false');
        }
      });

      // Logout
      document.getElementById('logout-btn').addEventListener('click', () => {
        if (confirm('Cerrar sesion?')) {
          window.auth.logout();
        }
      });

      // Settings menu link (close menu after click)
      document.querySelectorAll('.user-menu__item[data-route]').forEach(item => {
        item.addEventListener('click', () => {
          userMenu.classList.remove('user-menu--open');
        });
      });

      // Register routes
      window.router.register('conversations', window.conversationsView.render);
      window.router.register('kpis', window.kpisView.render);
      window.router.register('catalog', window.catalogView.render);
      window.router.register('settings', window.settingsView.render);

      // Init
      window.router.init('conversations');
    })();
  </script>
</body>
</html>

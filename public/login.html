<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <meta name="description" content="Panel de administracion Alebrijes Teotihuacan">
  <title>Iniciar sesion - Alebrijes Teotihuacan</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--tiliche-bar-height);
      background: var(--gradient-tiliches);
      z-index: 2;
    }

    .login-page::after {
      content: '';
      position: absolute;
      top: 10%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 94, 0, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-10) var(--space-8);
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 1;
    }

    .login-card__header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-card__logo {
      width: 88px;
      height: 88px;
      margin: 0 auto var(--space-5);
      display: block;
      border-radius: var(--radius-lg);
      background: var(--color-bg-card);
      padding: var(--space-2);
    }

    .login-card__title {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-semibold);
      color: var(--color-text);
      margin-bottom: var(--space-2);
      letter-spacing: -0.02em;
    }

    .login-card__subtitle {
      font-size: var(--fs-sm);
      color: var(--color-text-muted);
    }

    .login-form__forgot {
      display: block;
      text-align: right;
      font-size: var(--fs-sm);
      color: var(--color-primary);
      margin-top: var(--space-2);
      text-decoration: none;
    }

    .login-form__forgot:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    .login-form__submit {
      margin-top: var(--space-6);
    }

    .login-error {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      color: var(--color-danger);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-5);
      display: none;
    }

    .login-error--visible {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--fs-xs);
      color: var(--color-text-dim);
    }

    .login-loading {
      display: none;
    }

    .login-loading--visible {
      display: flex;
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.7);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xl);
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div class="login-card__header">
        <img class="login-card__logo" src="/logo-alebrijes.png" alt="Alebrijes Teotihuacan">
        <h1 class="login-card__title">Alebrijes Teotihuacan</h1>
        <p class="login-card__subtitle">Panel de administracion</p>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div class="login-error" id="login-error" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="email">
            Correo electronico<span class="form-label__required">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="tu@alebrijesteotihuacan.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            Contrasena<span class="form-label__required">*</span>
          </label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Ingresa tu contrasena"
            autocomplete="current-password"
            required
          >
          <a href="#" class="login-form__forgot" id="forgot-link">Olvide mi contrasena</a>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--block login-form__submit" id="login-submit">
          Iniciar sesion
        </button>
      </form>

      <p class="login-footer">Acceso restringido al personal autorizado</p>

      <div class="login-loading" id="login-loading" aria-hidden="true">
        <div class="brand-loader"><img class="brand-loader__logo" src="/logo-alebrijes.png" alt=""></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function() {
      'use strict';

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorEl = document.getElementById('login-error');
      const submitBtn = document.getElementById('login-submit');
      const loadingEl = document.getElementById('login-loading');
      const forgotLink = document.getElementById('forgot-link');

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add('login-error--visible');
      }

      function hideError() {
        errorEl.textContent = '';
        errorEl.classList.remove('login-error--visible');
      }

      function setLoading(loading) {
        if (loading) {
          loadingEl.classList.add('login-loading--visible');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Ingresando...';
        } else {
          loadingEl.classList.remove('login-loading--visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Iniciar sesion';
        }
      }

      // Verificar sesion existente al cargar
      async function checkExistingSession() {
        if (!window.supabaseClient) {
          // Esperar un poco a que cargue
          try {
            await window.supabaseClient?.waitForSupabase(3000);
          } catch (e) {}
        }
        if (window.auth && window.auth.isAuthenticated()) {
          // Validar contra el backend
          const ok = await window.auth.requireAuth();
          if (ok) {
            window.location.replace('/dashboard.html');
          }
        }
      }
      checkExistingSession();

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError('Por favor completa todos los campos');
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('El correo electronico no es valido');
          return;
        }

        setLoading(true);

        try {
          const result = await window.auth.signIn(email, password);

          if (!result.ok) {
            showError(result.error || 'Error al iniciar sesion');
            setLoading(false);
            return;
          }

          window.location.replace('/dashboard.html');
        } catch (err) {
          console.error('Login error:', err);
          showError('Error de conexion. Intenta de nuevo.');
          setLoading(false);
        }
      });

      emailInput.addEventListener('input', hideError);
      passwordInput.addEventListener('input', hideError);

      forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        alert('Contacta al administrador del sistema para restablecer tu contrasena.');
      });
    })();
  </script>
</body>
</html>

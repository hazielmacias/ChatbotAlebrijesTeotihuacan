<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Panel de administracion Alebrijes Teotihuacan">
  <title>Iniciar sesion - Alebrijes Teotihuacan</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/variables.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--color-bg-elevated);
    }

    /* === Split layout === */
    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 880px) {
      .login-page { grid-template-columns: 1fr; }
      .login-page__brand { display: none; }
    }

    /* === Tiliche bar (top) === */
    .login-page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--tiliche-bar-height);
      background: var(--gradient-tiliches);
      z-index: 10;
    }

    /* === Brand panel (left) === */
    .login-page__brand {
      position: relative;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(255, 94, 0, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 80%, rgba(0, 80, 179, 0.05) 0%, transparent 60%),
        var(--color-bg);
      padding: 64px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      overflow: hidden;
    }

    .login-page__brand::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 360px;
      height: 360px;
      background: conic-gradient(
        from 180deg,
        var(--color-tiliche-rosa) 0deg,
        var(--color-tiliche-verde) 72deg,
        var(--color-tiliche-azul) 144deg,
        var(--color-tiliche-amarillo) 216deg,
        var(--color-tiliche-morado) 288deg,
        var(--color-tiliche-rosa) 360deg
      );
      border-radius: 50%;
      opacity: 0.06;
      filter: blur(40px);
      pointer-events: none;
    }

    .login-page__brand-top {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .login-page__brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      padding: 4px;
      object-fit: contain;
    }

    .login-page__brand-name {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      font-weight: var(--fw-bold);
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .login-page__brand-content {
      position: relative;
      z-index: 2;
      max-width: 560px;
    }

    .login-page__brand-title {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: var(--fw-bold);
      color: var(--color-text);
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin: 0;
    }

    .login-page__brand-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* === Activity ring decorative element === */
    .login-page__rings {
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 280px;
      height: 280px;
      z-index: 1;
      opacity: 0.6;
      pointer-events: none;
    }

    .login-page__ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--color-border);
    }

    .login-page__ring:nth-child(1) {
      inset: 0;
      border-color: rgba(255, 94, 0, 0.18);
    }

    .login-page__ring:nth-child(2) {
      inset: 40px;
      border-color: rgba(0, 177, 79, 0.18);
    }

    .login-page__ring:nth-child(3) {
      inset: 80px;
      border-color: rgba(0, 80, 179, 0.18);
    }

    /* === Form panel (right) === */
    .login-page__form-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
      position: relative;
      background: var(--color-bg);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    .login-card__header {
      margin-bottom: 36px;
    }

    .login-card__title {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      color: var(--color-text);
      margin: 0 0 6px 0;
      letter-spacing: -0.025em;
    }

    .login-card__subtitle {
      font-size: var(--fs-sm);
      color: var(--color-text-muted);
      font-weight: var(--fw-medium);
      letter-spacing: -0.005em;
      margin: 0;
    }

    .password-input-wrap {
      position: relative;
    }

    .password-input-wrap .form-input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      color: var(--color-text-dim);
      cursor: pointer;
      padding: 0;
      transition: color 150ms ease, background 150ms ease;
    }

    .password-toggle:hover {
      color: var(--color-text);
      background: var(--color-bg-hover);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    .password-toggle .eye-off,
    .password-toggle .eye-on {
      display: none;
    }

    .password-toggle[data-state="hidden"] .eye-on { display: block; }
    .password-toggle[data-state="visible"] .eye-off { display: block; }

    .login-form__forgot {
      display: block;
      text-align: right;
      font-size: var(--fs-sm);
      color: var(--color-primary);
      margin-top: var(--space-2);
      text-decoration: none;
      font-weight: var(--fw-semibold);
      letter-spacing: -0.005em;
    }

    .login-form__forgot:hover {
      color: var(--color-primary-hover);
    }

    .login-form__submit {
      margin-top: var(--space-6);
    }

    .login-error {
      background: rgba(231, 76, 60, 0.08);
      border: 1px solid rgba(231, 76, 60, 0.24);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      color: var(--color-danger);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-5);
      display: none;
      font-weight: var(--fw-semibold);
    }

    .login-error--visible {
      display: block;
    }

    .login-loading {
      display: none;
    }

    .login-loading--visible {
      display: flex;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-card {
      transition: opacity 400ms ease;
    }

    .login-card--loading {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <aside class="login-page__brand">
      <div class="login-page__brand-top">
        <img class="login-page__brand-logo" src="/logo-alebrijes.png" alt="Alebrijes Teotihuacan">
        <div class="login-page__brand-name">Alebrijes Teotihuacan</div>
      </div>

      <div class="login-page__brand-content">
        <h1 class="login-page__brand-title">Alebrijes de Oaxaca Teotihuacán, <em>Chatbot.</em></h1>
      </div>

      <div class="login-page__rings" aria-hidden="true">
        <div class="login-page__ring"></div>
        <div class="login-page__ring"></div>
        <div class="login-page__ring"></div>
      </div>
    </aside>

    <section class="login-page__form-wrap">
      <div class="login-card" id="login-card">
        <div class="login-card__header">
          <h1 class="login-card__title">Iniciar sesión</h1>
          <p class="login-card__subtitle">Ingresa tus credenciales para continuar</p>
        </div>

        <form class="login-form" id="login-form" novalidate>
          <div class="login-error" id="login-error" role="alert"></div>

          <div class="form-group">
            <label class="form-label" for="email">
              Correo electrónico<span class="form-label__required">*</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="tu@alebrijesteotihuacan.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              Contraseña<span class="form-label__required">*</span>
            </label>
            <div class="password-input-wrap">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                required
              >
              <button type="button" class="password-toggle" id="password-toggle" data-state="hidden" title="Mostrar contraseña" aria-label="Mostrar contraseña">
                <svg class="eye-on" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <svg class="eye-off" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
              </button>
            </div>
            <a href="#" class="login-form__forgot" id="forgot-link">Olvidé mi contraseña</a>
          </div>

          <button type="submit" class="btn btn--primary btn--lg btn--block login-form__submit" id="login-submit">
            Iniciar sesión
          </button>
        </form>
      </div>
    </section>

    <div class="login-loading" id="login-loading" aria-hidden="true">
      <div class="brand-loader"><img class="brand-loader__logo" src="/logo-alebrijes.png" alt=""></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function() {
      'use strict';

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorEl = document.getElementById('login-error');
      const submitBtn = document.getElementById('login-submit');
      const loadingEl = document.getElementById('login-loading');
      const forgotLink = document.getElementById('forgot-link');
      const card = document.getElementById('login-card');

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add('login-error--visible');
      }

      function hideError() {
        errorEl.textContent = '';
        errorEl.classList.remove('login-error--visible');
      }

      function setLoading(loading) {
        if (loading) {
          card.classList.add('login-card--loading');
          loadingEl.classList.add('login-loading--visible');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Ingresando...';
        } else {
          card.classList.remove('login-card--loading');
          loadingEl.classList.remove('login-loading--visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Iniciar sesión';
        }
      }

      async function checkExistingSession() {
        if (!window.supabaseClient) {
          try {
            await window.supabaseClient?.waitForSupabase(3000);
          } catch (e) {}
        }
        if (window.auth && window.auth.isAuthenticated()) {
          const ok = await window.auth.requireAuth();
          if (ok) {
            window.location.replace('/dashboard.html');
          }
        }
      }
      checkExistingSession();

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError('Por favor completa todos los campos');
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('El correo electrónico no es válido');
          return;
        }

        setLoading(true);

        try {
          const result = await window.auth.signIn(email, password);

          if (!result.ok) {
            showError(result.error || 'Error al iniciar sesión');
            setLoading(false);
            return;
          }

          window.location.replace('/dashboard.html');
        } catch (err) {
          console.error('Login error:', err);
          showError('Error de conexión. Intenta de nuevo.');
          setLoading(false);
        }
      });

      emailInput.addEventListener('input', hideError);
      passwordInput.addEventListener('input', hideError);

      const passwordToggle = document.getElementById('password-toggle');
      passwordToggle.addEventListener('click', function() {
        const isHidden = passwordToggle.dataset.state === 'hidden';
        if (isHidden) {
          passwordInput.type = 'text';
          passwordToggle.dataset.state = 'visible';
          passwordToggle.title = 'Ocultar contraseña';
          passwordToggle.setAttribute('aria-label', 'Ocultar contraseña');
        } else {
          passwordInput.type = 'password';
          passwordToggle.dataset.state = 'hidden';
          passwordToggle.title = 'Mostrar contraseña';
          passwordToggle.setAttribute('aria-label', 'Mostrar contraseña');
        }
        passwordInput.focus();
      });

      forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        window.toast.info('Contacta al administrador del sistema para restablecer tu contraseña.', 6000);
      });
    })();
  </script>
</body>
</html>

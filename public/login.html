<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Panel de administracion Alebrijes Teotihuacan">
  <title>Iniciar sesion - Alebrijes Teotihuacan</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: var(--color-bg-elevated);
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--tiliche-bar-height);
      background: var(--gradient-tiliches);
      z-index: 2;
    }

    .login-page::after {
      content: '';
      position: absolute;
      top: 10%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 94, 0, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-10) var(--space-8);
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 1;
    }

    .login-card__header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-card__logo {
      width: 120px;
      height: 120px;
      margin: 0 auto var(--space-6);
      display: block;
      border-radius: var(--radius-2xl);
      background: var(--color-bg-card);
      padding: var(--space-3);
    }

    .login-card__title {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      color: var(--color-text);
      margin-bottom: var(--space-2);
      letter-spacing: -0.025em;
    }

    .login-card__subtitle {
      font-size: var(--fs-sm);
      color: var(--color-text-dim);
      font-weight: var(--fw-medium);
      letter-spacing: -0.005em;
    }

    .password-input-wrap {
      position: relative;
    }

    .password-input-wrap .form-input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      color: var(--color-text-dim);
      cursor: pointer;
      padding: 0;
      transition: color 150ms ease, background 150ms ease;
    }

    .password-toggle:hover {
      color: var(--color-text);
      background: var(--color-bg-hover);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    .password-toggle .eye-off,
    .password-toggle .eye-on {
      display: none;
    }

    .password-toggle[data-state="hidden"] .eye-on { display: block; }
    .password-toggle[data-state="visible"] .eye-off { display: block; }

    .login-form__forgot {
      display: block;
      text-align: right;
      font-size: var(--fs-sm);
      color: var(--color-primary);
      margin-top: var(--space-2);
      text-decoration: none;
    }

    .login-form__forgot:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    .login-form__submit {
      margin-top: var(--space-6);
    }

    .login-error {
      background: rgba(231, 76, 60, 0.08);
      border: 1px solid rgba(231, 76, 60, 0.24);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      color: var(--color-danger);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-5);
      display: none;
    }

    .login-error--visible {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--fs-xs);
      color: var(--color-text-dim);
    }

    .login-loading {
      display: none;
    }

    .login-loading--visible {
      display: flex;
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xl);
    }

    .login-card {
      transition: border-color 400ms ease;
    }

    .login-card__header,
    .login-form,
    .login-footer {
      transition: opacity 400ms ease;
    }

    .login-card--loading {
      min-height: 520px;
      border-color: transparent;
    }

    .login-card--loading .login-card__header,
    .login-card--loading .login-form,
    .login-card--loading .login-footer {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div class="login-card__header">
        <img class="login-card__logo" src="/logo-alebrijes.png" alt="Alebrijes Teotihuacan">
        <h1 class="login-card__title">Alebrijes Teotihuacan</h1>
        <p class="login-card__subtitle">Panel de administración</p>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div class="login-error" id="login-error" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="email">
            Correo electrónico<span class="form-label__required">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="tu@alebrijesteotihuacan.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            Contraseña<span class="form-label__required">*</span>
          </label>
          <div class="password-input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Ingresa tu contraseña"
              autocomplete="current-password"
              required
            >
            <button type="button" class="password-toggle" id="password-toggle" data-state="hidden" title="Mostrar contraseña" aria-label="Mostrar contraseña">
              <svg class="eye-on" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
            </button>
          </div>
          <a href="#" class="login-form__forgot" id="forgot-link">Olvidé mi contraseña</a>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--block login-form__submit" id="login-submit">
          Iniciar sesión
        </button>
      </form>

      <p class="login-footer">Acceso restringido al personal autorizado</p>

      <div class="login-loading" id="login-loading" aria-hidden="true">
        <div class="brand-loader"><img class="brand-loader__logo" src="/logo-alebrijes.png" alt=""></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function() {
      'use strict';

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorEl = document.getElementById('login-error');
      const submitBtn = document.getElementById('login-submit');
      const loadingEl = document.getElementById('login-loading');
      const forgotLink = document.getElementById('forgot-link');
      const card = document.querySelector('.login-card');

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add('login-error--visible');
      }

      function hideError() {
        errorEl.textContent = '';
        errorEl.classList.remove('login-error--visible');
      }

      function setLoading(loading) {
        if (loading) {
          card.classList.add('login-card--loading');
          loadingEl.classList.add('login-loading--visible');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Ingresando...';
        } else {
          card.classList.remove('login-card--loading');
          loadingEl.classList.remove('login-loading--visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Iniciar sesión';
        }
      }

      // Verificar sesion existente al cargar
      async function checkExistingSession() {
        if (!window.supabaseClient) {
          // Esperar un poco a que cargue
          try {
            await window.supabaseClient?.waitForSupabase(3000);
          } catch (e) {}
        }
        if (window.auth && window.auth.isAuthenticated()) {
          // Validar contra el backend
          const ok = await window.auth.requireAuth();
          if (ok) {
            window.location.replace('/dashboard.html');
          }
        }
      }
      checkExistingSession();

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError('Por favor completa todos los campos');
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('El correo electrónico no es válido');
          return;
        }

        setLoading(true);

        try {
          const result = await window.auth.signIn(email, password);

          if (!result.ok) {
            showError(result.error || 'Error al iniciar sesión');
            setLoading(false);
            return;
          }

          window.location.replace('/dashboard.html');
        } catch (err) {
          console.error('Login error:', err);
          showError('Error de conexión. Intenta de nuevo.');
          setLoading(false);
        }
      });

      emailInput.addEventListener('input', hideError);
      passwordInput.addEventListener('input', hideError);

      const passwordToggle = document.getElementById('password-toggle');
      passwordToggle.addEventListener('click', function() {
        const isHidden = passwordToggle.dataset.state === 'hidden';
        if (isHidden) {
          passwordInput.type = 'text';
          passwordToggle.dataset.state = 'visible';
          passwordToggle.title = 'Ocultar contraseña';
          passwordToggle.setAttribute('aria-label', 'Ocultar contraseña');
        } else {
          passwordInput.type = 'password';
          passwordToggle.dataset.state = 'hidden';
          passwordToggle.title = 'Mostrar contraseña';
          passwordToggle.setAttribute('aria-label', 'Mostrar contraseña');
        }
        passwordInput.focus();
      });

      forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        window.toast.info('Contacta al administrador del sistema para restablecer tu contraseña.', 6000);
      });
    })();
  </script>
</body>
</html>
